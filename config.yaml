problem_rules:
  collision:
    requires:
      - dent_rear_right_wing
      - dent_rear_left_wing
      - dent_front_right_wing
      - dent_front_left_wing
      - dent_hood
      - dent_trunk
      - dent_rear_bumper
      - dent_front_bumper
      - dent_rear_right_door
      - dent_rear_left_door
      - dent_front_right_door
      - dent_front_left_door
      - cracked_hood
      - cracked_rear_bumper
      - cracked_front_bumper
      - crushed_rear_right_wing
      - crushed_rear_left_wing
      - crushed_front_right_wing
      - crushed_front_left_wing
      - crushed_hood
      - crushed_trunk
      - crushed_rear_bumper
      - crushed_front_bumper
      - crushed_rear_right_door
      - crushed_rear_left_door
      - crushed_front_door
      - crushed_front_right_door
      - crushed_front_left_door
      - crushed_roof
      - crack_rear_right_wing
      - crack_rear_left_wing
      - crack_front_right_wing
      - crack_front_left_wing
      - crack_hood
      - crack_rear_bumper
      - crack_front_bumper
      - crack_rear_right_door
      - crack_rear_left_door
      - crack_front_right_door
      - crack_front_left_door
      - impact_windshield
      - impact_window
      - scratch_rear_right_wing
      - scratch_rear_left_wing
      - scratch_front_right_wing
      - scratch_front_left_wing
      - scratch_rear_bumper
      - scratch_front_bumper
      - scratch_rear_right_door
      - scratch_rear_left_door
      - scratch_front_right_door
      - scratch_front_left_door
      - broken_rear_light
      - broken_windshield
      - broken_headlight
      - broken_window
      - broken_mirror
      - wheel_damage
    min_classes: 1
  water_damage:
    requires:
      - blown_render_trapped_moisture
      - condensation
      - flaking_paint_trapped_moisture
      - rising_damp
      - penetrating_or_rising_damp
      - potential_leak_water_ingress
      - trapped_moisture
      - trapped_moisture_chimney_shoulder
      - trapped_moisture_chimney_stack
      - mould_growth
      - breached_dpc
      - damaged_render
    min_classes: 1
  fire_damage:
    requires:
      - fire_damage
    min_classes: 1
  storm_impact:
    requires:
      - broken_or_loose_roof_tile
      - structural_cracking
      - structural_cracking_trapped_moisture
      - structural_defect_trapped_water
      - structural_defect_chimney_breast
      - internal_cracking
      - sill_to_header_cracking_structural
      - stepped_cracking_structural
      - distortion_to_chimney
      - storm_debris
    min_classes: 1
  wear_tear:
    requires:
      - chipped_paint_rear_right_wing
      - chipped_paint_rear_left_wing
      - chipped_paint_front_right_wing
      - chipped_paint_front_left_wing
      - chipped_paint_hood
      - chipped_paint_trunk
      - chipped_paint_rear_bumper
      - chipped_paint_front_bumper
      - chipped_paint_rear_right_door
      - chipped_paint_rear_left_door
      - chipped_paint_front_right_door
      - chipped_paint_front_left_door
      - spalled_brickwork
      - brick_efflorescence
      - brick_algae
      - lichen_growth
    min_classes: 1

severity:
  low:
    max_classes: 1
    max_area_fraction: 0.05
    min_conf: 0.6
  medium:
    max_classes: 2
    max_area_fraction: 0.20
  high:
    min_classes: 3
