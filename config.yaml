# Pipeline Configuration — Insurance Damage Video Analysis

paths:
  videos_dir: "data/videos"
  keyframes_dir: "data/keyframes"
  labels_dir: "data/labels"
  model_dir: "models"
  export_dir: "export"

extraction:
  scene_threshold: 30.0
  blur_variance_min: 100
  dedup_corr_threshold: 0.95
  max_keyframes_per_video: 50

model:
  name: "yolo11n.pt"
  imgsz: 640
  conf_threshold: 0.25
  iou_threshold: 0.45
  device: "0"

training:
  epochs: 100
  batch: 8
  lr: 0.01
  patience: 20
  augment:
    mosaic: 0.5
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 10
    scale: 0.5

temporal_agg:
  iou_threshold: 0.3
  min_track_frames: 2

recap:
  max_output_keyframes: 5

# ── 100 unified classes (IDs 0-99) ──────────────────────────────────
#   0-68: car damage   69-96: property damage   97-99: orphaned
